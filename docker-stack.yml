version: '3.8'

services:

  mysql:
    image: academicaview/mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: academica123
      MYSQL_DATABASE: academicaview
    ports:
      - target: 3306
        published: 3306
        mode: host
    volumes:
      - mysql_data:/var/lib/mysql
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  ms-usuarios:
    image: academicaview/ms-usuarios:latest
    ports:
      - target: 3001
        published: 3001
        mode: host
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: academica123
      DB_NAME: academicaview
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  ms-estudiantes:
    image: academicaview/ms-estudiantes:latest
    ports:
      - target: 3002
        published: 3002
        mode: host
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: academica123
      DB_NAME: academicaview
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  ms-analitica:
    image: academicaview/ms-analitica:latest
    ports:
      - target: 3003
        published: 3003
        mode: host
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: academica123
      DB_NAME: academicaview
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  frontend:
    image: academicaview/frontend:latest
    ports:
      - target: 80
        published: 8080
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

networks:
  academicaview-net:
    driver: overlay

volumes:
  mysql_data:
