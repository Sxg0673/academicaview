version: '3.8'

services:

  mysql:
    image: academicaview/mysql:latest
    environment:
      MYSQL_ROOT_PASSWORD: academica123
      MYSQL_DATABASE: academicaview
    ports:
      - target: 3306
        published: 3306
        mode: host
    volumes:
      - mysql_data:/var/lib/mysql
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  ms-usuarios:
    image: academicaview/ms-usuarios:latest
    ports:
      - target: 3001
        published: 3001
        mode: host
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: academica123
      DB_NAME: academicaview
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  ms-estudiantes:
    image: academicaview/ms-estudiantes:latest
    ports:
      - target: 3002
        published: 3002
        mode: host
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: academica123
      DB_NAME: academicaview
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  ms-analitica:
    image: academicaview/ms-analitica:latest
    ports:
      - target: 3003
        published: 3003
        mode: host
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: academica123
      DB_NAME: academicaview
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  frontend:
    image: academicaview/frontend:latest
    ports:
      - target: 80
        published: 8080
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  spark-master:
    image: spark:3.5.8
    hostname: spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - target: 8080
        published: 8090
        mode: host
      - target: 7077
        published: 7077
        mode: host
    environment:
      SPARK_EXTRA_CLASSPATH: "/opt/extra-jars/*"
    volumes:
      - ./pyspark/data:/workspace/data
      - ./pyspark/jars:/opt/extra-jars
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  spark-worker-1:
    image: spark:3.5.8
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    environment:
      SPARK_EXTRA_CLASSPATH: "/opt/extra-jars/*"
    volumes:
      - ./pyspark/data:/workspace/data
      - ./pyspark/jars:/opt/extra-jars
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  spark-worker-2:
    image: spark:3.5.8
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    environment:
      SPARK_EXTRA_CLASSPATH: "/opt/extra-jars/*"
    volumes:
      - ./pyspark/data:/workspace/data
      - ./pyspark/jars:/opt/extra-jars
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  jupyter:
    image: academicaview/jupyter:latest
    hostname: jupyter
    working_dir: /workspace
    environment:
      SPARK_EXTRA_CLASSPATH: "/opt/extra-jars/*"
    volumes:
      - ./pyspark/notebooks:/workspace/notebooks
      - ./pyspark/data:/workspace/data
      - ./pyspark/jars:/opt/extra-jars
    ports:
      - target: 8888
        published: 8888
        mode: host
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

  minio:
    image: minio/minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - target: 9000
        published: 9000
        mode: host
      - target: 9001
        published: 9001
        mode: host
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
    networks:
      - academicaview-net

networks:
  academicaview-net:
    driver: overlay

volumes:
  mysql_data:
