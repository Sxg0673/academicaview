version: '3.8'

services:

  mysql:
    build: ./mysql
    image: academicaview/mysql:latest
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: academica123
      MYSQL_DATABASE: academicaview
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pacademica123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - academicaview-net

  ms-usuarios:
    build: ./backend/ms-usuarios
    image: academicaview/ms-usuarios:latest
    container_name: ms-usuarios
    ports:
      - "3001:3001"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: academica123
      DB_NAME: academicaview
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - academicaview-net

  ms-estudiantes:
    build: ./backend/ms-estudiantes
    image: academicaview/ms-estudiantes:latest
    container_name: ms-estudiantes
    ports:
      - "3002:3002"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: academica123
      DB_NAME: academicaview
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - academicaview-net

  ms-analitica:
    build: ./backend/ms-analitica
    image: academicaview/ms-analitica:latest
    container_name: ms-analitica
    ports:
      - "3003:3003"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: academica123
      DB_NAME: academicaview
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - academicaview-net

  frontend:
    build: ./frontend
    image: academicaview/frontend:latest
    container_name: frontend
    ports:
      - "8080:80"
    networks:
      - academicaview-net

  spark-master:
    image: spark:3.5.8
    container_name: spark-master
    hostname: spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - "8090:8080"
      - "7077:7077"
    environment:
      SPARK_EXTRA_CLASSPATH: "/opt/extra-jars/*"
    volumes:
      - ./pyspark/data:/workspace/data
      - ./pyspark/jars:/opt/extra-jars
    networks:
      - academicaview-net

  spark-worker-1:
    image: spark:3.5.8
    container_name: spark-worker-1
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    environment:
      SPARK_EXTRA_CLASSPATH: "/opt/extra-jars/*"
    volumes:
      - ./pyspark/data:/workspace/data
      - ./pyspark/jars:/opt/extra-jars
    depends_on:
      - spark-master
    networks:
      - academicaview-net

  spark-worker-2:
    image: spark:3.5.8
    container_name: spark-worker-2
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    environment:
      SPARK_EXTRA_CLASSPATH: "/opt/extra-jars/*"
    volumes:
      - ./pyspark/data:/workspace/data
      - ./pyspark/jars:/opt/extra-jars
    depends_on:
      - spark-master
    networks:
      - academicaview-net

  jupyter:
    build:
      context: ./pyspark
      dockerfile: Dockerfile.jupyter
    image: academicaview/jupyter:latest
    container_name: jupyter
    hostname: jupyter
    working_dir: /workspace
    environment:
      SPARK_EXTRA_CLASSPATH: "/opt/extra-jars/*"
    volumes:
      - ./pyspark/notebooks:/workspace/notebooks
      - ./pyspark/data:/workspace/data
      - ./pyspark/jars:/opt/extra-jars
    ports:
      - "8888:8888"
    depends_on:
      - spark-master
    networks:
      - academicaview-net

  minio:
    image: minio/minio
    container_name: minio
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - academicaview-net

networks:
  academicaview-net:
    driver: bridge

volumes:
  mysql_data:
