<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcadémicaView - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-4">
        <div class="card shadow">
          <div class="card-header bg-primary text-white text-center">
            <h4>AcadémicaView</h4>
            <small>Dashboard de Rendimiento Académico</small>
          </div>
          <div class="card-body">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="tu@academicaview.edu">
            </div>
            <div class="mb-3">
              <label class="form-label">Contraseña</label>
              <input type="password" class="form-control" id="password">
            </div>
            <button class="btn btn-primary w-100" onclick="login()">Ingresar</button>
            <div id="mensaje" class="alert mt-3 d-none"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    async function login() {
      const email    = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const mensaje  = document.getElementById('mensaje');

      try {
        const res  = await fetch(`${CONFIG.API_USUARIOS}/api/usuarios/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (res.ok) {
          sessionStorage.setItem('usuario', JSON.stringify(data.usuario));
          if (data.usuario.rol === 'profesor') {
            window.location.href = 'dashboard-profesor.html';
          } else {
            window.location.href = 'dashboard-estudiante.html';
          }
        } else {
          mensaje.className = 'alert alert-danger mt-3';
          mensaje.textContent = data.error;
        }
      } catch (err) {
        mensaje.className = 'alert alert-danger mt-3';
        mensaje.textContent = 'Error al conectar con el servidor';
      }
    }
  </script>
</body>
</html>
